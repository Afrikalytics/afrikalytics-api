name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: afrikalytics_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - run: pip install -r requirements.txt

      - name: Install test deps
        run: pip install pytest pytest-cov httpx

      - name: Run tests
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=40 -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/afrikalytics_test
          SECRET_KEY: test-secret-key-ci
          ENVIRONMENT: testing

  security:
    name: Security Scan (Bandit)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit

      - name: Bandit SAST
        run: bandit -r app/ auth.py main.py -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-deploy
          path: bandit-report.json

  deploy:
    name: Deploy to Railway (${{ github.event.inputs.environment || 'production' }})
    runs-on: ubuntu-latest
    needs: [test, security]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        id: deploy
        run: |
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment to stabilize
        run: sleep 30

      - name: Health Check
        id: healthcheck
        run: |
          API_URL="${{ vars.API_URL || 'https://web-production-ef657.up.railway.app' }}"
          echo "Checking health at: $API_URL/health"

          MAX_RETRIES=5
          RETRY_DELAY=15
          SUCCESS=false

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$API_URL/health" || echo "000")
            echo "HTTP status: $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              SUCCESS=true
              echo "Health check passed."
              break
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
            fi
          done

          if [ "$SUCCESS" = "false" ]; then
            echo "Health check FAILED after $MAX_RETRIES attempts."
            exit 1
          fi

      - name: Verify API docs endpoint
        if: success()
        run: |
          API_URL="${{ vars.API_URL || 'https://web-production-ef657.up.railway.app' }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$API_URL/docs" || echo "000")
          echo "API docs returned: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Warning: /docs endpoint returned $HTTP_CODE"
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Backend Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment || 'production' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ${{ steps.healthcheck.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Result Summary
        run: |
          RESULT="${{ needs.deploy.result }}"
          echo "## Deployment Notification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$RESULT" = "success" ]; then
            echo "Backend deployment to **${{ github.event.inputs.environment || 'production' }}** succeeded." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Health check: PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "Backend deployment to **${{ github.event.inputs.environment || 'production' }}** **FAILED**." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY
          fi
