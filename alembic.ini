# Alembic Configuration File
# See https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration environment
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# sys.path additions (project root so that models/database are importable)
prepend_sys_path = .

# Timezone for migration file timestamps
timezone = UTC

# sqlalchemy.url is set dynamically in env.py from DATABASE_URL env var
# Do NOT hardcode a connection string here.
# sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
